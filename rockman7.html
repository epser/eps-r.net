<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ロックマン7 パスワードジェネレータ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{padding:16px}
h1{margin-bottom:14px;}
h1, legend {font-family:'Courier New',Courier,monospace;}

/* ── Layout ── */
.container{
  display:grid;
  grid-template-columns:528px 1fr;
  grid-template-rows:auto auto;
  grid-template-areas:"left right" "errors right";
  gap:14px;
  align-items:start;
}
.left-col  {grid-area:left;display:flex;flex-direction:column;gap:8px}
.right-col {grid-area:right;grid-row:1/3}
.errors-col{grid-area:errors;align-self:start}
@media(max-width:660px){
  .container{grid-template-columns:1fr;grid-template-areas:"left" "right" "errors"}
  .right-col{grid-row:auto!important}
}

/* ── Canvas ── */
canvas{display:block;width:528px;height:579px;image-rendering:pixelated;image-rendering:crisp-edges}

/* ── Text input (ゲーム内パスワード画面を模した表示) ── */
#pw-text{
  width:528px;font-family:'Courier New',Courier,monospace;font-size:1.05rem;
  letter-spacing:3px;text-align:center;background:#000010;color:#e8e840;
  border:2px solid #334;border-radius:3px;padding:6px 8px;outline:none;
  transition:border-color .15s
}
#pw-text:focus{border-color:#557}
#pw-text.invalid{border-color:#a44;color:#f88}

/* ── Fieldset ── */
fieldset{border:1px solid;border-radius:4px;padding:10px 14px;}
legend{font-size:0.75rem;letter-spacing:1px;padding:0 6px}
.section{margin-bottom:10px}
.section:last-child{margin-bottom:0}
.section-label{font-size:0.75rem;margin-bottom:5px;padding-bottom:2px;border-bottom:1px solid;}
.check-row{display:flex;flex-wrap:wrap;gap:4px 10px}
.check-item{display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;white-space:nowrap}
.check-item input[type=checkbox]{cursor:pointer}
.num-row{display:flex;flex-wrap:wrap;align-items:center;gap:6px 14px}
.num-item{display:flex;align-items:center;gap:5px}
select{cursor:pointer;padding:3px}
input[type=number]{width:64px;padding-block:6px}

.description{margin-top:24px;max-width:900px;line-height:1.7}

/* ── Errors / Warnings ── */
.error-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.error-list li[data-level=error]  {border-left:3px solid #d44;padding:5px 10px;font-size:0.75rem;border-radius:0 2px 2px 0}
.error-list li[data-level=warning]{border-left:3px solid #c84;padding:5px 10px;font-size:0.75rem;border-radius:0 2px 2px 0}
.error-list li[data-level=cc2]    {border-left:3px solid #88c;padding:5px 10px;font-size:0.75rem;border-radius:0 2px 2px 0}
</style>
</head>
<body>
<h1>Mega Man 7 Password Generator</h1>

<div class="container">

  <!-- 左: キャンバス + テキスト -->
  <div class="left-col">
    <canvas id="pw-canvas" width="176" height="193"></canvas>
    <input type="text" id="pw-text" maxlength="19" spellcheck="false" placeholder="--------">
  </div>

  <!-- 右: 設定 -->
  <div class="right-col">
    <fieldset>
      <legend>Game State</legend>

      <div class="section">
        <div class="section-label">プロローグ</div>
        <div class="check-row">
          <label class="check-item"><input type="checkbox" data-flag="prologue_nc"> OP未クリア</label>
        </div>
      </div>

      <div class="section">
        <div class="section-label">前半ボス</div>
        <div class="check-row">
          <label class="check-item"><input type="checkbox" data-flag="freeze"> フリーズマン</label>
          <label class="check-item"><input type="checkbox" data-flag="cloud"> クラウドマン</label>
          <label class="check-item"><input type="checkbox" data-flag="junk"> ジャンクマン</label>
          <label class="check-item"><input type="checkbox" data-flag="burst"> バーストマン</label>
        </div>
      </div>

      <div class="section">
        <div class="section-label">中間フラグ</div>
        <div class="check-row">
          <label class="check-item"><input type="checkbox" data-flag="mash"> 博物館クリア</label>
          <label class="check-item"><input type="checkbox" data-flag="intro_skip"> 後半ボス出現演出を見た</label>
        </div>
      </div>

      <div class="section">
        <div class="section-label">後半ボス</div>
        <div class="check-row">
          <label class="check-item"><input type="checkbox" data-flag="turbo"> ターボマン</label>
          <label class="check-item"><input type="checkbox" data-flag="spring"> スプリングマン</label>
          <label class="check-item"><input type="checkbox" data-flag="slash"> スラッシュマン</label>
          <label class="check-item"><input type="checkbox" data-flag="shade"> シェードマン</label>
        </div>
      </div>

      <div class="section">
        <div class="section-label">ワイリー</div>
        <div class="check-row">
          <label class="check-item"><input type="checkbox" data-flag="wily_open"> ワイリーステージ解放</label>
        </div>
      </div>

      <div class="section">
        <div class="section-label">強化アイテム</div>
        <div class="check-row">
          <label class="check-item"><input type="checkbox" data-flag="hyper_rocket"> ハイパーロケットバスター</label>
          <label class="check-item"><input type="checkbox" data-flag="e_balancer"> エネルギーバランサー</label>
          <label class="check-item"><input type="checkbox" data-flag="shop_upgrade"> ショップ強化済フラグ</label>
        </div>
      </div>

      <div class="section">
        <div class="section-label">コレクタブル</div>
        <div class="check-row">
          <label class="check-item"><input type="checkbox" data-flag="r_plate"> R</label>
          <label class="check-item"><input type="checkbox" data-flag="u_plate"> U</label>
          <label class="check-item"><input type="checkbox" data-flag="s_plate"> S</label>
          <label class="check-item"><input type="checkbox" data-flag="h_plate"> H</label>
          <label class="check-item"><input type="checkbox" data-flag="super_screw"> スーパーネジ</label>
        </div>
      </div>

      <div class="section">
        <div class="section-label">追加装備</div>
        <div class="check-row">
          <label class="check-item"><input type="checkbox" data-flag="rush_search"> ラッシュサーチ</label>
          <label class="check-item"><input type="checkbox" data-flag="rush_jet"> ラッシュジェット</label>
          <label class="check-item"><input type="checkbox" data-flag="super_adapter"> スーパーアダプター</label>
          <label class="check-item"><input type="checkbox" data-flag="blues_shield"> ブルースシールド</label>
        </div>
      </div>

      <div class="section">
        <div class="section-label">ビート</div>
        <div class="num-row">
          <label class="check-item"><input type="checkbox" data-flag="beat_rescue"> 救出済</label>
          <div class="num-item">
            <span>所持数</span>
            <select id="beat-count">
              <option>0</option><option>1</option><option>2</option><option>3</option><option>4</option>
            </select>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">消費アイテム</div>
        <div class="num-row">
          <div class="num-item"><span>E缶</span>
            <select id="e-tank"><option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option></select>
          </div>
          <div class="num-item"><span>W缶</span>
            <select id="w-tank"><option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option></select>
          </div>
          <label class="check-item"><input type="checkbox" data-flag="s_tank"> S缶</label>
          <label class="check-item"><input type="checkbox" data-flag="exit"> EXIT</label>
        </div>
      </div>

      <div class="section">
        <div class="section-label">ネジ</div>
        <div class="num-item">
          <input type="number" id="screws" min="0" max="999" value="0">
        </div>
        <div class="section-label">チェックビット</div>
        <div class="check-row">
          <label class="check-item"><input type="checkbox" id="cb-flip0" checked> チェックビット0 (7文字目)</label>
          <label class="check-item"><input type="checkbox" id="cb-flip1"> チェックビット1 (9文字目)</label>
        </div>
      </div>

    </fieldset>
  </div>

  <!-- エラー -->
  <div class="errors-col">
    <ul class="error-list" id="error-list"></ul>
  </div>

</div>

<div class="description">
</div>
<script>
'use strict';

// ===== pw_calc =====

const PW_BASE = [0,7,3,5, 2,5,1,7, 4,4,1,6, 0,3,6,2];

const MASKS = {
  freeze:       {6:1, 10:4},
  cloud:        {1:4, 6:1},
  junk:         {6:1, 8:4},
  burst:        {6:1, 7:1},
  mash:         {6:1, 10:1},
  intro_skip:   {1:1, 6:1},
  turbo:        {6:1, 15:1},
  spring:       {4:1, 6:1},
  slash:        {6:1, 13:2},
  shade:        {5:1, 6:1},
  rush_search:  {6:1, 11:1},
  rush_jet:     {0:2, 6:1},
  hyper_rocket: {6:1, 12:1},
  super_screw:  {6:1, 13:4},
  shop_upgrade: {6:1, 11:2},
  e_balancer:   {1:2, 6:1},
  s_tank:       {6:1, 12:4},
  exit:         {6:1, 15:2},
  beat_rescue:  {6:1,  9:2},
  beat_b0:      {6:1, 10:2},
  beat_b1:      {2:1,  6:1},
  beat_b2:      {3:2,  6:1},
  e_tank_b0:    {6:1, 13:1},
  e_tank_b1:    {6:1,  9:1},
  e_tank_b2:    {6:1, 15:4},
  w_tank_b0:    {6:1,  7:2},
  w_tank_b1:    {3:1,  6:1},
  w_tank_b2:    {3:4,  6:1},
  r_plate:      {6:1, 14:1},
  u_plate:      {6:1,  9:4},
  s_plate:      {6:1,  0:4},
  h_plate:      {6:5},
  super_adapter:{6:1, 14:2},
  wily_open:    {4:4,  6:1},
  blues_shield: {6:1,  7:4},
  prologue_nc:  {6:3},
};

const CHECKSUM_FLAGS = new Set([
  'freeze','cloud','junk','burst',
  'turbo','spring','slash','shade',
  'mash','intro_skip',
  'rush_search','rush_jet',
  'r_plate','u_plate','s_plate','h_plate','super_adapter',
  'hyper_rocket','super_screw','shop_upgrade','e_balancer','s_tank',
  'beat_rescue','beat_b0','beat_b1','beat_b2',
  'e_tank_b0','e_tank_b1','e_tank_b2',
  'w_tank_b0','w_tank_b1','w_tank_b2',
  'exit','wily_open','blues_shield','prologue_nc',
]);

const SCREW_BITS = [[4,2],[2,4],[8,2],[11,4],[5,2],[12,2],[14,4],[0,1],[2,2],[5,4]];

function bitsToFlags(n, b0, b1, b2) {
  const r = [];
  if (n & 1) r.push(b0);
  if (n & 2) r.push(b1);
  if (n & 4) r.push(b2);
  return r;
}

function calcPassword(flagSet, screws) {
  const pw = [...PW_BASE];
  let csCount = 0;
  for (const name of flagSet) {
    const mask = MASKS[name];
    if (!mask) continue;
    for (const [k, v] of Object.entries(mask)) { pw[+k] ^= v; pw[+k] &= 7; }
    if (CHECKSUM_FLAGS.has(name)) csCount++;
  }
  let parity = 0, popcount = 0;
  for (let bit = 0; bit < 10; bit++) {
    if ((screws >> bit) & 1) {
      const [pos, xv] = SCREW_BITS[bit];
      pw[pos] ^= xv; pw[pos] &= 7;
      parity ^= 1; popcount++;
    }
  }
  if (parity) { pw[6] ^= 1; pw[6] &= 7; }
  const total = csCount + popcount;
  if (total % 4 === 2 || total % 4 === 3) { pw[8] ^= 1; pw[8] &= 7; }
  return pw;
}

function pwToStr(pw) {
  const d = pw.map(v => v === 0 ? 8 : v);
  return `${d[0]}${d[1]}${d[2]}${d[3]}-${d[4]}${d[5]}${d[6]}${d[7]}-${d[8]}${d[9]}${d[10]}${d[11]}-${d[12]}${d[13]}${d[14]}${d[15]}`;
}

function decodePassword(s) {
  const cleaned = s.replace(/-/g, '');
  if (cleaned.length !== 16 || !/^\d{16}$/.test(cleaned)) return null;
  const pw   = cleaned.split('').map(c => +c % 8);
  const diff = pw.map((v, i) => v ^ PW_BASE[i]);

  let screws = 0, parity = 0;
  for (let bit = 0; bit < 10; bit++) {
    const [pos, xv] = SCREW_BITS[bit];
    if ((diff[pos] & xv) === xv) {
      screws |= (1 << bit); diff[pos] ^= xv; parity ^= 1;
    }
  }
  if (parity) diff[6] ^= 1;
  diff[8] &= 6;

  const flags = new Set();
  for (const [name, mask] of Object.entries(MASKS)) {
    const entries = Object.entries(mask).map(([p,v]) => [+p, v]);
    const non6 = entries.filter(([p]) => p !== 6);
    if (non6.length === 0) continue;
    if (non6.every(([p, xv]) => (diff[p] & xv) === xv)) {
      flags.add(name);
      for (const [p, xv] of entries) diff[p] ^= xv;
    }
  }
  for (const [name, mask] of Object.entries(MASKS)) {
    const entries = Object.entries(mask).map(([p,v]) => [+p, v]);
    if (entries.every(([p]) => p === 6)) {
      const xv6 = mask[6];
      if ((diff[6] & xv6) === xv6) { flags.add(name); diff[6] ^= xv6; }
    }
  }
  return { flags, screws };
}

// ===== Validation =====

const G1 = ['freeze','cloud','junk','burst'];
const G2 = ['turbo','spring','slash','shade'];

function validateFlags(flags) {
  const errors = [], warnings = [];
  const g1all = G1.every(f => flags.has(f));
  const g2any = G2.some(f  => flags.has(f));
  const g2all = G2.every(f => flags.has(f));
  const hasBeatCount = ['beat_b0','beat_b1','beat_b2'].some(f => flags.has(f));

  const PROGRESS_FLAGS = [...G1, ...G2, 'mash', 'intro_skip', 'wily_open', 'blues_shield'];
  if (flags.has('prologue_nc') && PROGRESS_FLAGS.some(f => flags.has(f)))
    errors.push('入力不可: オープニング未クリアと進行系フラグ（ボス・マッシュ・後半演出済・ワイリー・ブルースシールド）は共存できません');

  if (flags.has('intro_skip') && !(g1all && flags.has('mash')))
    errors.push('入力不可: 後半演出済 には 前半4体撃破 + マッシュ撃破 が必要');
  if (g2any && !(g1all && flags.has('mash') && flags.has('intro_skip')))
    errors.push('入力不可: 後半ボス には 前半4体 + マッシュ + 後半演出済 が必要');
  if (flags.has('wily_open') && !(g1all && g2all && flags.has('mash') && flags.has('intro_skip')))
    errors.push('入力不可: ワイリーステージ解放 には 全8ボス + マッシュ + 後半演出済 が必要');
  if (flags.has('blues_shield') && !(g1all && g2all && flags.has('mash') && flags.has('intro_skip')))
    errors.push('入力不可: ブルースシールド には 全8ボス + マッシュ + 後半演出済 が必要');
  if (hasBeatCount && !flags.has('beat_rescue'))
    warnings.push('影響あり: ビートアイテムはビートを救出するまで表示・購入・使用不可になります（クラコレ2ではエラー）');
  const platesAll = ['r_plate','u_plate','s_plate','h_plate'].every(f => flags.has(f));
  if (platesAll && !flags.has('super_adapter'))
    warnings.push('影響あり: RUSHプレート4枚かつスーパーアダプターが無いため、スーパーロックマンを取得できないパスワードです');

  if (g1all && g2all && flags.has('mash') && flags.has('intro_skip') && !flags.has('wily_open'))
    warnings.push('影響あり: 次回適当なステージをクリアするまでワイリーステージが出現しません');

  if (flags.has('super_screw') && !flags.has('shop_upgrade'))
    warnings.push('スーパーネジ未引き渡し: ビッグエディーでライトット強化演出が流れます');

  // クラコレ2 固有バリデーション
  const cc2errors = [];
  const hasIntro = flags.has('intro_skip');
  const hasShopOrSearch = flags.has('shop_upgrade') || flags.has('rush_search');
  if (flags.has('super_screw') && !hasIntro)
    cc2errors.push('クラコレ2入力不可: スーパーネジ には 後半演出済 が必要');
  if (flags.has('shop_upgrade') && !flags.has('super_screw'))
    cc2errors.push('クラコレ2入力不可: ショップ強化 には スーパーネジ が必要');
  if (flags.has('e_balancer') && !(hasIntro && hasShopOrSearch))
    cc2errors.push('クラコレ2入力不可: エネルギーバランサー には 後半演出済 + (ショップ強化 or ラッシュサーチ) が必要');
  if (flags.has('hyper_rocket') && !(hasIntro && hasShopOrSearch))
    cc2errors.push('クラコレ2入力不可: ハイパーロケットバスター には 後半演出済 + (ショップ強化 or ラッシュサーチ) が必要');
  if (flags.has('super_adapter') && !platesAll)
    cc2errors.push('クラコレ2入力不可: スーパーアダプター には R・U・S・Hプレート全取得 が必要');
  if (flags.has('beat_rescue') && !flags.has('turbo'))
    cc2errors.push('クラコレ2入力不可: ビート救出 には ターボマン撃破 が必要');

  const etank = (flags.has('e_tank_b0') ? 1 : 0) | (flags.has('e_tank_b1') ? 2 : 0) | (flags.has('e_tank_b2') ? 4 : 0);
  const wtank = (flags.has('w_tank_b0') ? 1 : 0) | (flags.has('w_tank_b1') ? 2 : 0) | (flags.has('w_tank_b2') ? 4 : 0);
  if (etank >= 5)
    cc2errors.push(`クラコレ2入力不可: E缶${etank}個 (最大4個)`);
  if (wtank >= 5)
    cc2errors.push(`クラコレ2入力不可: W缶${wtank}個 (最大4個)`);

  return { errors, warnings, cc2errors };

const IMG_BG = new Image();
const IMG_CHIP = [null];
(function() {
  IMG_BG.src = 'data:image/webp;base64,' + B64_BG;
  const srcs = [null,B64_C1,B64_C2,B64_C3,B64_C4,B64_C5,B64_C6,B64_C7,B64_C8];
  for (let d = 1; d <= 8; d++) {
    const img = new Image();
    img.src = 'data:image/webp;base64,' + srcs[d];
    IMG_CHIP.push(img);
  }
})();

const canvas = document.getElementById('pw-canvas');
const ctx    = canvas.getContext('2d');

function drawCanvas(pw) {
  ctx.clearRect(0, 0, 176, 193);
  if (IMG_BG.complete) ctx.drawImage(IMG_BG, 0, 0);
  for (let i = 0; i < 16; i++) {
    const col = i % 4, row = Math.floor(i / 4);
    const dx = 12 + col * 40;
    const dy =  9 + row * 40;
    const digit = pw[i] === 0 ? 8 : pw[i];
    const img = IMG_CHIP[digit];
    if (img && img.complete) ctx.drawImage(img, dx, dy);
  }
}

function _waitImages(cb) {
  const imgs = [IMG_BG, ...IMG_CHIP.slice(1)];
  Promise.all(imgs.map(img => new Promise(r => {
    if (img.complete) { r(); return; }
    img.onload = r; img.onerror = r;
  }))).then(cb);
}

// ===== State =====

function collectState() {
  const flags = new Set();
  document.querySelectorAll('[data-flag]:checked').forEach(el => flags.add(el.dataset.flag));

  const beat  = parseInt(document.getElementById('beat-count').value) || 0;
  const etank = parseInt(document.getElementById('e-tank').value)     || 0;
  const wtank = parseInt(document.getElementById('w-tank').value)     || 0;
  const screws = Math.max(0, Math.min(999, parseInt(document.getElementById('screws').value) || 0));

  for (const f of bitsToFlags(beat,  'beat_b0',   'beat_b1',   'beat_b2'))   flags.add(f);
  for (const f of bitsToFlags(etank, 'e_tank_b0', 'e_tank_b1', 'e_tank_b2')) flags.add(f);
  for (const f of bitsToFlags(wtank, 'w_tank_b0', 'w_tank_b1', 'w_tank_b2')) flags.add(f);

  return { flags, screws };
}

function applyState(decoded) {
  document.querySelectorAll('[data-flag]').forEach(el => {
    el.checked = decoded.flags.has(el.dataset.flag);
  });

  const bitsOf = (...names) => names.reduce((n, f, i) => n | (decoded.flags.has(f) ? (1 << i) : 0), 0);

  document.getElementById('beat-count').value = Math.min(4, bitsOf('beat_b0','beat_b1','beat_b2'));
  document.getElementById('e-tank').value     = Math.min(7, bitsOf('e_tank_b0','e_tank_b1','e_tank_b2'));
  document.getElementById('w-tank').value     = Math.min(7, bitsOf('w_tank_b0','w_tank_b1','w_tank_b2'));
  document.getElementById('screws').value     = decoded.screws;
}

// ===== Update =====

let suppressUpdate = false;

function renderErrors(flags) {
  const ul = document.getElementById('error-list');
  ul.innerHTML = '';
  const { errors, warnings, cc2errors } = validateFlags(flags);
  for (const msg of errors) {
    const li = document.createElement('li');
    li.dataset.level = 'error';
    li.textContent = '✕ ' + msg;
    ul.appendChild(li);
  }
  for (const msg of cc2errors) {
    const li = document.createElement('li');
    li.dataset.level = 'cc2';
    li.textContent = '✕ ' + msg;
    ul.appendChild(li);
  }
  for (const msg of warnings) {
    const li = document.createElement('li');
    li.dataset.level = 'warning';
    li.textContent = '⚠ ' + msg;
    ul.appendChild(li);
  }
}

function update(keepBits = false) {
  if (suppressUpdate) return;
  const { flags, screws } = collectState();
  const pw = calcPassword(flags, screws);

  const cb0 = document.getElementById('cb-flip0');
  const cb1 = document.getElementById('cb-flip1');

  let bitError = false;
  if (!keepBits) {
    // フラグ変更時: 正しいビット値にチェックボックスを合わせる（エラー不要）
    // suppressUpdateでchange再発火を防ぐ
    suppressUpdate = true;
    cb0.checked = (pw[6] & 1) === 1;
    cb1.checked = (pw[8] & 1) === 1;
    suppressUpdate = false;
  } else {
    // ユーザーが手動変更: チェックボックスの値をビットに強制
    if ((pw[6] & 1) !== (cb0.checked ? 1 : 0)) pw[6] ^= 1;
    if ((pw[8] & 1) !== (cb1.checked ? 1 : 0)) pw[8] ^= 1;
    const correctPw = calcPassword(flags, screws);
    bitError = (cb0.checked ? 1 : 0) !== (correctPw[6] & 1)
            || (cb1.checked ? 1 : 0) !== (correctPw[8] & 1);
  }

  drawCanvas(pw);

  const textEl = document.getElementById('pw-text');
  textEl.value = pwToStr(pw);
  textEl.classList.toggle('invalid', bitError);

  renderErrors(flags);

  if (bitError) {
    const ul = document.getElementById('error-list');
    const li = document.createElement('li');
    li.dataset.level = 'error';
    li.textContent = '✕ チェックビットエラー: このパスワードはゲームで受理されません';
    ul.insertBefore(li, ul.firstChild);
  }
}

// ===== Events =====

document.querySelectorAll('[data-flag]').forEach(el => el.addEventListener('change', () => update()));
document.getElementById('cb-flip0').addEventListener('change', () => update(true));
document.getElementById('cb-flip1').addEventListener('change', () => update(true));
['beat-count','e-tank','w-tank'].forEach(id => document.getElementById(id).addEventListener('change', () => update()));
document.getElementById('screws').addEventListener('input', () => update());

document.getElementById('pw-text').addEventListener('input', function () {
  const digits = this.value.replace(/[^0-9]/g, '');
  if (digits.length !== 16) {
    this.classList.toggle('invalid', digits.length > 0);
    return;
  }
  const formatted = `${digits.slice(0,4)}-${digits.slice(4,8)}-${digits.slice(8,12)}-${digits.slice(12,16)}`;
  const decoded = decodePassword(formatted);
  if (!decoded) { this.classList.add('invalid'); return; }

  // チェックビット・フラグ反映: すべてsuppressUpdate内でまとめて行う
  const inputPw = digits.split('').map(c => +c % 8);
  const expectedPw = calcPassword(decoded.flags, decoded.screws);
  const checksumOk = (inputPw[8] & 1) === (expectedPw[8] & 1);
  this.classList.toggle('invalid', !checksumOk);
  suppressUpdate = true;
  document.getElementById('cb-flip0').checked = (inputPw[6] & 1) === 1;
  document.getElementById('cb-flip1').checked = (inputPw[8] & 1) === 1;
  applyState(decoded);
  suppressUpdate = false;

  drawCanvas(inputPw);
  renderErrors(collectState().flags);

  if (!checksumOk) {
    const ul = document.getElementById('error-list');
    const li = document.createElement('li');
    li.dataset.level = 'error';
    li.textContent = '✕ チェックビットエラー: このパスワードはゲームで受理されません';
    ul.insertBefore(li, ul.firstChild);
  }
});

// 初期描画
_waitImages(update);
</script>
